<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="tile">
      <rect x="16" y="16" width="480" height="480" rx="116"/>
    </clipPath>
    <clipPath id="bundle-clip">
      <path d="M202 524C204 491 211 463 205 433C200 403 203 376 214 350C237 342 267 326 293 309C303 334 308 376 303 407C298 438 307 475 310 524Z"/>
    </clipPath>
    <linearGradient id="background" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#191a20"/>
      <stop offset="1" stop-color="#0d0e10"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.44" r="0.5">
      <stop offset="0" stop-color="#f0bd2f" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#f0bd2f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="strand-left" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe078"/>
      <stop offset="0.55" stop-color="#f2c13f"/>
      <stop offset="1" stop-color="#ca9016"/>
    </linearGradient>
    <linearGradient id="strand-middle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe487"/>
      <stop offset="0.58" stop-color="#f4c747"/>
      <stop offset="1" stop-color="#d39a1b"/>
    </linearGradient>
    <linearGradient id="strand-right" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd45e"/>
      <stop offset="0.58" stop-color="#eeb72f"/>
      <stop offset="1" stop-color="#bf8110"/>
    </linearGradient>
    <linearGradient id="bundle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8cf50"/>
      <stop offset="0.48" stop-color="#e6aa20"/>
      <stop offset="1" stop-color="#bd790c"/>
    </linearGradient>
    <linearGradient id="wrap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe17a"/>
      <stop offset="0.52" stop-color="#f3c444"/>
      <stop offset="1" stop-color="#d29215"/>
    </linearGradient>
    <filter id="soft-shadow" x="-30%" y="-20%" width="160%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect id="icon-background" x="16" y="16" width="480" height="480" rx="116" fill="url(#background)"/>
  <rect id="icon-border" x="16.5" y="16.5" width="479" height="479" rx="115.5" fill="none" stroke="#2b2e35"/>
  <circle id="icon-glow" cx="256" cy="228" r="205" fill="url(#glow)"/>

  <g id="icon-mark" clip-path="url(#tile)" filter="url(#soft-shadow)">
    <!-- Five loose fibers. Every root extends well into the intact bundle, so no
         strand can read as a detached accent when the icon is downsampled. -->
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M236 378C230 342 214 311 196 284C180 260 171 239 173 220C174 213 177 208 182 204" stroke="url(#strand-left)" stroke-width="19"/>
      <path d="M247 369C250 323 241 277 229 231C220 198 214 171 213 151" stroke="url(#strand-left)" stroke-width="16"/>
      <path d="M257 363C256 329 259 294 263 262C267 231 268 207 266 188" stroke="url(#strand-middle)" stroke-width="17"/>
      <path d="M269 369C276 320 289 274 301 232C312 194 316 160 313 134" stroke="url(#strand-right)" stroke-width="16"/>
      <path d="M280 378C300 344 321 315 337 289C353 264 360 241 356 221C355 214 352 209 348 205" stroke="url(#strand-right)" stroke-width="19"/>
    </g>

    <!-- The intact rope has a gentle alternating silhouette and a few broad,
         curved wraps. Broad wraps survive at favicon scale without becoming a
         striped pole. -->
    <path d="M202 524C204 491 211 463 205 433C200 403 203 376 214 350C237 342 267 326 293 309C303 334 308 376 303 407C298 438 307 475 310 524Z" fill="url(#bundle)"/>
    <g clip-path="url(#bundle-clip)">
      <path d="M179 526C219 506 267 479 327 433L329 472C278 510 233 534 188 550Z" fill="url(#wrap)"/>
      <path d="M177 445C219 428 267 401 321 359L324 398C275 435 229 460 183 477Z" fill="url(#wrap)"/>
      <path d="M184 367C226 351 270 326 311 295L315 333C275 365 232 388 190 402Z" fill="url(#wrap)"/>
      <g fill="none" stroke-linecap="round">
        <path d="M181 526C224 507 273 477 329 435" stroke="#8f5809" stroke-opacity="0.52" stroke-width="7"/>
        <path d="M180 445C223 427 271 398 323 359" stroke="#8f5809" stroke-opacity="0.52" stroke-width="7"/>
        <path d="M186 367C228 350 271 325 313 294" stroke="#8f5809" stroke-opacity="0.52" stroke-width="7"/>
        <path d="M226 532C224 481 224 431 230 383C233 358 239 340 248 329" stroke="#fff0a4" stroke-opacity="0.2" stroke-width="5"/>
      </g>
    </g>
  </g>
</svg>
